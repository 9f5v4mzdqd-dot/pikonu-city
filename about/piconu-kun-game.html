    <style>        body { font-family: 'Helvetica Neue', Arial, sans-serif; background-color: #2c3e50; display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; margin: 0; }
        #game-container { position: relative; width: 800px; height: 500px; border: 6px solid #5d4037; border-radius: 10px; box-shadow: 0 10px 20px rgba(0,0,0,0.5); overflow: hidden; background: #fdf6e3; }
        
        .scene { position: absolute; width: 100%; height: 100%; display: none; }
        .active { display: block; }
        
        /* タイトル画面 */
        #scene-title { background: #5d4037; color: white; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        #title-text { font-size: 2.2rem; font-weight: bold; margin-bottom: 15px; text-align: center; color: #ffe0b2; }
        #title-piconu { margin-bottom: 20px; animation: bounce 2s infinite ease-in-out; }
        #start-button { padding: 12px 35px; font-size: 1.25rem; background: #e91e63; color: white; border: none; border-radius: 25px; cursor: pointer; font-weight: bold; box-shadow: 0 4px 10px rgba(0,0,0,0.3); transition: all 0.2s; }
        #start-button:hover { background: #c2185b; transform: scale(1.05); }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* 部屋画面 */
        #scene-room { background: #f4ecdc; }
        
        /* 畳の床 */
        .tatami-floor { position: absolute; bottom: 0; width: 100%; height: 180px; background: #c2b280; border-top: 4px solid #4a5d23; }
        .tatami-line { position: absolute; width: 100%; height: 2px; background: rgba(74,93,35,0.3); }

        /* クリック可能なSVGイラスト物体 */
        .obj { position: absolute; cursor: pointer; transition: transform 0.15s ease, filter 0.15s ease; }
        .obj:hover { transform: scale(1.03); filter: drop-shadow(0 0 8px rgba(255, 235, 59, 0.8)); }

        #obj-door { top: 40px; left: 40px; width: 110px; height: 280px; }
        #obj-window { top: 30px; left: 190px; width: 150px; height: 160px; }
        #obj-shelf { top: 110px; left: 370px; width: 230px; height: 190px; }
        #obj-table { top: 330px; left: 240px; width: 260px; height: 120px; }
        #obj-piconu { top: 260px; left: 630px; width: 130px; height: 180px; }

        /* 背中画面 */
        #scene-piconu-back { background: #fff8e1; }
        #piconu-back-body { position: absolute; top: 40px; left: 200px; width: 400px; height: 400px; background: #ffecb3; border: 6px solid #ffa000; border-radius: 120px 120px 30px 30px; display: flex; flex-direction: column; align-items: center; justify-content: center; box-shadow: inset 0 0 20px rgba(0,0,0,0.05); }
        #btn-back-button { width: 90px; height: 90px; background: radial-gradient(circle, #ff8f00 0%, #d84315 100%); border: 5px solid #8d6e63; border-radius: 50%; cursor: pointer; box-shadow: 0 6px #5d4037; transition: all 0.1s; }
        #btn-back-button:active { transform: translateY(6px); box-shadow: none; }

        /* UI */
        .back-btn { position: absolute; top: 15px; left: 15px; padding: 8px 16px; background: #5d4037; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; z-index: 100; }
        #msg-box { position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%); width: 85%; padding: 16px; background: rgba(44, 62, 80, 0.95); color: white; border: 3px solid #ffe0b2; border-radius: 8px; display: none; z-index: 300; text-align: center; line-height: 1.6; font-size: 1.1rem; box-shadow: 0 5px 15px rgba(0,0,0,0.5); }
        #msg-close-btn { margin-top: 10px; padding: 6px 18px; background: #ffe0b2; color: #3e2723; border: none; border-radius: 4px; font-weight: bold; cursor: pointer; }
        
        #item-bar { width: 800px; height: 50px; background: #3e2723; display: flex; align-items: center; padding: 0 15px; box-sizing: border-box; }
        .item-slot { width: 40px; height: 40px; background: #d7ccc8; margin-right: 10px; border-radius: 4px; display: flex; align-items: center; justify-content: center; font-size: 1.3rem; border: 2px solid #a1887f; }

        /* モーダル共通スタイル */
        .modal { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); background: #fff8e1; padding: 25px; border: 5px solid #5d4037; border-radius: 12px; display: none; z-index: 200; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.4); }
        .modal input { font-size: 1.8rem; width: 140px; text-align: center; margin: 15px 0; border: 3px solid #8d6e63; border-radius: 6px; padding: 5px; letter-spacing: 4px; }
        .modal button { padding: 8px 16px; background: #e91e63; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 0.95rem; font-weight: bold; margin: 5px; }
        .modal button.secondary { background: #757575; }
        .modal button.blue { background: #0288d1; }
    </style>
</head>
<body>

    <a href="piconu-kun.html" style="position:fixed; top:10px; right:14px; z-index:500; font-family:'Helvetica Neue',Arial,sans-serif; font-size:0.8rem; color:#ffe0b2; background:rgba(93,64,55,0.85); padding:6px 12px; border-radius:14px; text-decoration:none;">← ピコぬ市公式サイトに戻る</a>

    <div id="game-container">
        <!-- (0) タイトル画面 -->
        <div id="scene-title" class="scene active">
            <div id="title-text">ピコぬ市役所からの脱出<br>〜閉ざされた畳敷き相談室〜</div>
            
            <!-- タイトル用 ピコぬ君 -->
            <div id="title-piconu">
                <svg width="140" height="180">
                    <rect x="20" y="40" width="100" height="130" rx="45" fill="#fff8e1" stroke="#ffe082" stroke-width="5"/>
                    <polygon points="70,5 50,25 90,25" fill="#ffb300"/>
                    <circle cx="70" cy="30" r="10" fill="#ffffff" stroke="#ffb300" stroke-width="2"/>
                    <circle cx="50" cy="75" r="6" fill="#3e2723"/>
                    <circle cx="90" cy="75" r="6" fill="#3e2723"/>
                    <!-- にっこり口元 -->
                    <path d="M 58 90 Q 70 100 82 90" stroke="#3e2723" stroke-width="3" fill="none" stroke-linecap="round"/>
                    <!-- ほっぺ -->
                    <circle cx="42" cy="85" r="6" fill="#ffab91" opacity="0.7"/>
                    <circle cx="98" cy="85" r="6" fill="#ffab91" opacity="0.7"/>
                    <rect x="35" y="110" width="70" height="45" rx="5" fill="#37474f" stroke="#ffb300" stroke-width="2"/>
                    <rect x="40" y="115" width="60" height="35" fill="#000000"/>
                    <text x="47" y="138" font-size="12" fill="#00e676" font-family="monospace">PIO-????</text>
                </svg>
            </div>

            <button id="start-button" onclick="startGame(event)">ゲーム開始ぬ！</button>
        </div>

        <!-- (1) 畳敷き相談室 -->
        <div id="scene-room" class="scene">
            <div class="tatami-floor">
                <div class="tatami-line" style="top: 60px;"></div>
                <div class="tatami-line" style="top: 120px;"></div>
            </div>

            <!-- 🚪 ドア -->
            <div id="obj-door" class="obj" onclick="clickDoor()">
                <svg width="110" height="280">
                    <rect x="5" y="5" width="100" height="270" rx="4" fill="#8d6e63" stroke="#5d4037" stroke-width="6"/>
                    <rect x="20" y="25" width="70" height="100" fill="#a1887f" stroke="#5d4037" stroke-width="3"/>
                    <rect x="20" y="145" width="70" height="110" fill="#a1887f" stroke="#5d4037" stroke-width="3"/>
                    <circle cx="20" cy="140" r="7" fill="#ffb300"/>
                    <rect x="75" y="125" width="18" height="30" rx="3" fill="#333"/>
                    <circle cx="84" cy="133" r="3" fill="#00e676"/>
                </svg>
            </div>

            <!-- 🪟 窓 -->
            <div id="obj-window" class="obj" onclick="clickWindow()">
                <svg width="150" height="160">
                    <rect x="5" y="5" width="140" height="150" fill="#e0f7fa" stroke="#8d6e63" stroke-width="6"/>
                    <line x1="75" y1="5" x2="75" y2="155" stroke="#8d6e63" stroke-width="4"/>
                    <line x1="5" y1="80" x2="145" y2="80" stroke="#8d6e63" stroke-width="4"/>
                    <circle cx="40" cy="110" r="25" fill="#81c784"/>
                    <circle cx="110" cy="40" r="15" fill="#ffffff" opacity="0.8"/>
                </svg>
            </div>

            <!-- 📚 書類棚 -->
            <div id="obj-shelf" class="obj" onclick="clickShelf()">
                <svg width="230" height="190">
                    <rect x="5" y="5" width="220" height="180" fill="#a1887f" stroke="#5d4037" stroke-width="6"/>
                    <line x1="5" y1="95" x2="225" y2="95" stroke="#5d4037" stroke-width="6"/>
                    <rect x="20" y="25" width="18" height="60" fill="#1e88e5"/>
                    <rect x="40" y="25" width="18" height="60" fill="#43a047"/>
                    <rect x="60" y="25" width="18" height="60" fill="#e53935"/>
                    <rect x="80" y="25" width="18" height="60" fill="#fb8c00"/>
                    <rect x="130" y="115" width="20" height="60" fill="#1e88e5"/>
                    <rect x="152" y="115" width="20" height="60" fill="#43a047"/>
                    <rect x="174" y="115" width="20" height="60" fill="#e53935"/>
                </svg>
            </div>

            <!-- 🍵 低い机＆湯呑み -->
            <div id="obj-table" class="obj" onclick="clickTable()">
                <svg width="260" height="120">
                    <rect x="20" y="60" width="20" height="50" fill="#4e342e"/>
                    <rect x="220" y="60" width="20" height="50" fill="#4e342e"/>
                    <rect x="5" y="20" width="250" height="50" rx="8" fill="#6d4c41" stroke="#3e2723" stroke-width="4"/>
                    <rect x="180" y="28" width="18" height="22" rx="3" fill="#ffffff" stroke="#b0bec5" stroke-width="2"/>
                    <ellipse cx="189" cy="30" rx="7" ry="3" fill="#81c784"/>
                    <rect x="60" y="30" width="40" height="30" fill="#fff9c4" stroke="#fbc02d" stroke-width="2"/>
                </svg>
            </div>

            <!-- 🤖 ピコぬ君 -->
            <div id="obj-piconu" class="obj" onclick="clickPiconuInRoom()">
                <svg width="130" height="180">
                    <rect x="15" y="40" width="100" height="130" rx="45" fill="#fff8e1" stroke="#ffe082" stroke-width="5"/>
                    <polygon points="65,5 45,25 85,25" fill="#ffb300"/>
                    <circle cx="65" cy="30" r="10" fill="#ffffff" stroke="#ffb300" stroke-width="2"/>
                    <circle cx="45" cy="75" r="5" fill="#3e2723"/>
                    <circle cx="85" cy="75" r="5" fill="#3e2723"/>
                    <line x1="60" y1="90" x2="70" y2="90" stroke="#3e2723" stroke-width="3"/>
                    <rect x="30" y="110" width="70" height="45" rx="5" fill="#37474f" stroke="#ffb300" stroke-width="2"/>
                    <rect x="35" y="115" width="60" height="35" fill="#000000"/>
                    <text id="piconu-screen-text" x="42" y="138" font-size="12" fill="#00e676" font-family="monospace">PIO-????</text>
                </svg>
            </div>
        </div>

        <!-- (2) ピコぬ君の背中画面 -->
        <div id="scene-piconu-back" class="scene">
            <button class="back-btn" onclick="moveScene('room', event)">← 部屋に戻る</button>
            <div id="piconu-back-body">
                <p style="font-weight:bold; color:#5d4037; font-size:1.2rem; margin-bottom:20px;">ピコぬ君の背中</p>
                <div id="btn-back-button" onclick="pressPiconuButton()"></div>
                <p style="font-size:0.9rem; color:#795548; margin-top:25px; font-weight:bold;">（中央のボタンを押すぬ）</p>
            </div>
        </div>

        <!-- メッセージ -->
        <div id="msg-box">
            <div id="msg-text"></div>
            <button id="msg-close-btn" onclick="hideMsg()">閉じるぬ</button>
        </div>

        <!-- 暗号入力モーダル -->
        <div id="code-modal" class="modal">
            <h3 style="margin:0; color:#5d4037;">4桁の暗号を入力</h3>
            <input type="text" id="code-input" maxlength="4" placeholder="0000"><br>
            <button onclick="checkCode()">決定</button>
            <button onclick="closeModal('code-modal')" class="secondary">キャンセル</button>
        </div>

        <!-- ピコぬ君のメニューモーダル -->
        <div id="piconu-menu-modal" class="modal">
            <h3 style="margin:0 0 15px 0; color:#5d4037;">ピコぬ君「どうするぬ？」</h3>
            <button class="blue" onclick="choosePiconuOption('back', event)">背中をみる</button>
            <button onclick="choosePiconuOption('reset', event)">最初に戻る</button>
            <button class="secondary" onclick="choosePiconuOption('cancel', event)">やめる</button>
        </div>
    </div>

    <!-- アイテム欄 -->
    <div id="item-bar">
        <span style="color:white; margin-right:15px; font-size:0.85rem; font-weight:bold;">所持アイテム:</span>
        <div id="slot-0" class="item-slot"></div>
    </div>

<script>
    let state = { hasCard: false, knowCode: false, isEscaped: false };

    function showMsg(text) {
        document.getElementById('msg-text').innerHTML = text;
        document.getElementById('msg-box').style.display = 'block';
    }
    
    function hideMsg() {
        document.getElementById('msg-box').style.display = 'none';
        if (state.isEscaped) {
            moveScene('title');
        }
    }

    function startGame(e) {
        if(e) e.stopPropagation();
        state = { hasCard: false, knowCode: false, isEscaped: false };
        
        document.getElementById('slot-0').innerHTML = '';
        document.getElementById('code-input').value = '';
        document.getElementById('piconu-screen-text').textContent = 'PIO-????';
        
        moveScene('room');
        showMsg('「はっ！福祉課で絵本読んでたら、いつの間にかお昼寝しちゃったぬ。<br>職員さんたちも、みんな帰っちゃって部屋にカギがかかってて出られないぬ。<br>部屋を調べて脱出するぬ。」');
    }

    function moveScene(sceneId, e) {
        if(e) e.stopPropagation();
        document.getElementById('msg-box').style.display = 'none';
        
        document.querySelectorAll('.scene').forEach(el => {
            el.classList.remove('active');
            el.style.display = 'none';
        });
        
        const target = document.getElementById(`scene-${sceneId}`);
        target.classList.add('active');
        target.style.display = (sceneId === 'piconu-back' || sceneId === 'title') ? 'flex' : 'block';
    }

    function clickWindow() {
        showMsg('窓の外にはのどかなピコぬ市の風景が広がっているぬ。ここからは脱出できないぬ。');
    }

    function clickTable() {
        showMsg('机の上に「福祉課の記録ファイル」があるぬ。<br>『鍵の暗号は、ピコぬ君のモニターに映る数字…』と書かれているぬ！');
    }

    function clickShelf() {
        if (!state.hasCard) {
            state.hasCard = true;
            document.getElementById('slot-0').innerHTML = '💳';
            showMsg('棚の隙間から「PIOカード（市民証）」を見つけたぬ！<br>（アイテム欄に入ったぬ）');
        } else {
            showMsg('棚には過去の「福祉課だより」や、市民相談の記録ファイルが大切に保管されているぬ。<br><b>「誰かの困りごとも、街の大切な記録なんだぬ」</b>');
        }
    }

    function clickPiconuInRoom() {
        document.getElementById('piconu-menu-modal').style.display = 'block';
    }

    function choosePiconuOption(option, e) {
        if(e) e.stopPropagation();
        document.getElementById('piconu-menu-modal').style.display = 'none';
        
        if (option === 'back') {
            moveScene('piconu-back');
        } else if (option === 'reset') {
            moveScene('title');
        }
    }

    function pressPiconuButton() {
        state.knowCode = true;
        document.getElementById('piconu-screen-text').textContent = 'PIO-2026';
        showMsg('ポチッ！<br>ピコぬ君「温故知新！ピコぬ君のお腹のモニターを見るんだぬ！【2026】が表示されたぬ！」');
    }

    function clickDoor() {
        document.getElementById('code-modal').style.display = 'block';
    }

    function closeModal(modalId) {
        document.getElementById(modalId).style.display = 'none';
        if (modalId === 'code-modal') {
            document.getElementById('code-input').value = '';
        }
    }

    function checkCode() {
        const val = document.getElementById('code-input').value;
        if (val === '2026') {
            if (state.hasCard) {
                state.isEscaped = true;
                closeModal('code-modal');
                showMsg('🔑 ガチャッ！！<br>暗号が解除され、PIOカードをかざしてドアが開いたぬ！<br><br>🎉 <b>「やったぬ！脱出成功だぬ！<br>帰ったらちゃんと休むぬ。休む時間も大切な生活の一部だぬ。」</b> 🎉');
            } else {
                closeModal('code-modal');
                showMsg('暗号は合っているぬが、カードリーダーがピカピカ光っているぬ。<br>「市民証（PIOカード）」が必要みたいだぬ！');
            }
        } else {
            closeModal('code-modal');
            showMsg('「ブブー！暗号が違うぬ。」');
        }
    }
</script>

</body>
</html>
