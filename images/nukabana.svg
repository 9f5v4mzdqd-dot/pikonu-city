  <path d="M120 185 C100 180, 88 190, 82 205 C100 205, 112 198, 120 185 Z" fill="#6a9a63"/>
  <path d="M120 195 C142 190, 154 200, 160 214 C140 213, 128 206, 120 195 Z" fill="#5c8a58"/>

